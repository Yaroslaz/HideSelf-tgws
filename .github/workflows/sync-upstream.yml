name: Sync Upstream and Auto Release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/Flowseal/tg-ws-proxy.git
  BASE_BRANCH: main
  HS_TAG_PREFIX: v1.0.0-hs.

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add and fetch upstream
        run: |
          set -euo pipefail
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_REPO"
          else
            git remote add upstream "$UPSTREAM_REPO"
          fi
          git fetch origin "$BASE_BRANCH" --tags --force
          git fetch upstream --tags --force

      - name: Resolve latest upstream tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          LATEST_TAG=$(git tag --list --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -z "${LATEST_TAG:-}" ]; then
            echo "Failed to resolve latest upstream tag."
            exit 1
          fi

          TAG_SHA=$(git rev-list -n 1 "$LATEST_TAG")
          if git merge-base --is-ancestor "$TAG_SHA" "origin/$BASE_BRANCH"; then
            UPDATE_NEEDED=false
          else
            UPDATE_NEEDED=true
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "update_needed=$UPDATE_NEEDED" >> "$GITHUB_OUTPUT"

      - name: Stop when no update is needed
        if: steps.resolve.outputs.update_needed == 'false'
        run: |
          echo "Upstream tag ${{ steps.resolve.outputs.latest_tag }} is already included in $BASE_BRANCH."

      - name: Merge upstream tag into main
        if: steps.resolve.outputs.update_needed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B "$BASE_BRANCH" "origin/$BASE_BRANCH"
          git merge --no-ff --no-edit "${{ steps.resolve.outputs.latest_tag }}"

      - name: Capture upstream changelog
        if: steps.resolve.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          LATEST_TAG="${{ steps.resolve.outputs.latest_tag }}"
          mkdir -p .hideself

          RELEASE_JSON=$(gh api "repos/Flowseal/tg-ws-proxy/releases/tags/${LATEST_TAG}" || true)
          if [ -n "${RELEASE_JSON:-}" ]; then
            RELEASE_TITLE=$(echo "$RELEASE_JSON" | jq -r '.name // empty')
            RELEASE_URL=$(echo "$RELEASE_JSON" | jq -r '.html_url // empty')
            RELEASE_PUBLISHED=$(echo "$RELEASE_JSON" | jq -r '.published_at // empty')
            RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          else
            RELEASE_TITLE=""
            RELEASE_URL="https://github.com/Flowseal/tg-ws-proxy/releases/tag/${LATEST_TAG}"
            RELEASE_PUBLISHED=""
            RELEASE_BODY="Failed to fetch upstream changelog automatically."
          fi

          jq -n \
            --arg tag "$LATEST_TAG" \
            --arg title "$RELEASE_TITLE" \
            --arg url "$RELEASE_URL" \
            --arg published_at "$RELEASE_PUBLISHED" \
            --arg body "$RELEASE_BODY" \
            '{
              upstream: "Flowseal/tg-ws-proxy",
              tag: $tag,
              title: ($title | select(length > 0)),
              url: ($url | select(length > 0)),
              published_at: ($published_at | select(length > 0)),
              body: $body
            }' > .hideself/upstream-changelog.json

          {
            echo "# Upstream Changelog (${LATEST_TAG})"
            echo
            if [ -n "$RELEASE_TITLE" ]; then
              echo "**Title:** $RELEASE_TITLE"
              echo
            fi
            if [ -n "$RELEASE_URL" ]; then
              echo "**Source:** $RELEASE_URL"
              echo
            fi
            if [ -n "$RELEASE_PUBLISHED" ]; then
              echo "**Published at:** $RELEASE_PUBLISHED"
              echo
            fi
            echo "## Notes"
            echo
            echo "$RELEASE_BODY"
            echo
          } > .hideself/upstream-changelog.md

          git add .hideself/upstream-changelog.json .hideself/upstream-changelog.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(sync): import upstream changelog ${LATEST_TAG}"
          fi

      - name: Calculate next HideSelf release tag
        if: steps.resolve.outputs.update_needed == 'true'
        id: hs-tag
        shell: bash
        run: |
          set -euo pipefail

          LAST_HS_TAG=$(git tag --list "${HS_TAG_PREFIX}*" --sort=-v:refname | head -n 1 || true)
          if [ -z "${LAST_HS_TAG:-}" ]; then
            NEXT_NUMBER=1
          else
            LAST_NUMBER="${LAST_HS_TAG#${HS_TAG_PREFIX}}"
            NEXT_NUMBER=$((LAST_NUMBER + 1))
          fi

          NEXT_TAG="${HS_TAG_PREFIX}${NEXT_NUMBER}"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

      - name: Push main and release tag
        if: steps.resolve.outputs.update_needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          NEXT_TAG="${{ steps.hs-tag.outputs.next_tag }}"
          git push origin "$BASE_BRANCH"
          git tag -a "$NEXT_TAG" -m "HideSelf TGWS runtime release ${NEXT_TAG} (upstream ${{ steps.resolve.outputs.latest_tag }})"
          git push origin "refs/tags/${NEXT_TAG}"

      - name: Summary
        if: steps.resolve.outputs.update_needed == 'true'
        run: |
          echo "Synced upstream ${{ steps.resolve.outputs.latest_tag }} into $BASE_BRANCH and created release tag ${{ steps.hs-tag.outputs.next_tag }}."
