name: Build & Release (HideSelf Runtime)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0-hs.3)"
        required: true
        default: "v1.0.0-hs.local"

permissions:
  contents: write

jobs:
  build-windows-runtime:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup MSVC 14.40 toolset
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.40

      - name: Install dependencies
        run: pip install .

      - name: Build PyInstaller bootloader from source
        run: pip install "pyinstaller==6.16.0" --no-binary pyinstaller
        env:
          PYINSTALLER_COMPILE_BOOTLOADER: 1

      - name: Build HideSelf runtime EXE
        run: pyinstaller packaging/hideself-windows.spec --noconfirm

      - name: Normalize artifact name
        shell: pwsh
        run: Move-Item dist/hideself-tgws.exe dist/hideself-tgws_windows.exe -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hideself-tgws-runtime
          path: dist/hideself-tgws_windows.exe

  release:
    needs: [build-windows-runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          pattern: hideself-tgws-runtime
          path: dist
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}"
          {
            echo "# HideSelf TGWS Runtime ${TAG}"
            echo
            echo "Managed TG WS runtime artifact for HideSelf."
            echo
            if [ -f ".hideself/upstream-changelog.md" ]; then
              echo "## Upstream Author Changelog"
              echo
              cat .hideself/upstream-changelog.md
            else
              echo "## Upstream Author Changelog"
              echo
              echo "Changelog file not found in repository for this build."
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
          name: "HideSelf TGWS Runtime ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}"
          body_path: RELEASE_NOTES.md
          files: |
            dist/hideself-tgws_windows.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
